server {
     listen 8080;

     root  /usr/share/nginx/html;
     index index.html;

     error_page 500 502 503 504  /50x.html;

     location = /iframe.html {

         try_files $uri =404;
     }

     location / {
         try_files $uri $uri/ /index.html;
     }

    location = /50x.html {
      root /usr/share/nginx/html/;
    }
}
